services:
  # Backend Service
  - type: web
    name: flyinco-backend
    runtime: node
    plan: free # Change if needed
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 18.x # Match your local node version if possible
      - key: DATABASE_URL
        sync: false # User will provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # Frontend Service
  - type: web
    name: flyinco-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: flyinco-backend
          type: web
          property: url
