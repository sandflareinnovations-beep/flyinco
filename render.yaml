services:
  # Backend Service
  - type: web
    name: flyinco-backend
    runtime: node
    plan: free # Change if needed
    buildCommand: cd backend && npm install --legacy-peer-deps && npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 18.x # Match your local node version if possible
      - key: DATABASE_URL
        sync: false # User will provide this in Render dashboard
      - key: JWT_SECRET
        value: flyinco_production_stable_secret_2024
      - key: PORT
        value: 10000

  # Frontend Service
  - type: web
    name: flyinco-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NEXT_PUBLIC_API_URL
        sync: false # User will provide this manually after backend is live
