services:
  # Backend Service
  - type: web
    name: flyinco-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --legacy-peer-deps && npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        value: flyinco_production_stable_secret_2024
      - key: PORT
        value: 10000

  # Frontend Service
  - type: web
    name: flyinco-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: cd frontend && node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: 3000
      - key: NEXT_SHARP_PATH
        value: /opt/render/project/src/frontend/node_modules/sharp
